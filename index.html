<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Product 3d Viewer</title>
  <link rel="stylesheet" href="./styles.css" />
  <meta name="theme-color" content="#115da8" />
</head>
<body>
  <header class="topbar">
    <h1>Product 3d Viewer</h1>
  </header>

  <main class="app">
    <section class="viewer-shell" aria-label="3D viewer">
      <div class="viewer-meta">
        <button id="widthLabel" type="button" data-edit-dimension="width">Width 3820 mm</button>
        <button id="depthLabel" type="button" data-edit-dimension="depth">Projection 5980 mm</button>
        <button id="heightLabel" type="button" data-edit-dimension="height">Height 3200 mm</button>
        <span id="countLabel">25 lamellas</span>
      </div>
      <iframe id="viewerFrame" title="B-CUBE FREEDOM 3D viewer"></iframe>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
